name: Shared — Commit & Push

on:
  workflow_call:
    inputs:
      commit_message:
        required: true
        type: string
      paths:
        required: true
        type: string

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 커밋 권한을 위해 기본 토큰 사용
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage files
        run: git add ${{ inputs.paths }}

      - name: Commit (변경 없으면 스킵)
        run: |
          git diff --staged --quiet \
            && echo "변경 없음 — 커밋 스킵" \
            || git commit -m "${{ inputs.commit_message }}"

      - name: Push
        run: git push
