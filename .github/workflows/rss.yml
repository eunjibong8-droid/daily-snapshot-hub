name: RSS Daily Snapshot

on:
  workflow_dispatch:   # 수동 트리거로 먼저 테스트
  # schedule:
  #   - cron: '0 23 * * *'   # 매일 KST 08:00 (UTC 23:00 전날)

concurrency:
  group: commit-main    # Phase 2+ 모듈과 동시 커밋 충돌 방지
  cancel-in-progress: false

jobs:
  collect-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # git push 권한

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run RSS collector
        run: uv run python -m daily_hub.collectors.rss

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/rss state/rss-last-seen.json
          git diff --staged --quiet \
            && echo "변경 없음 — 커밋 스킵" \
            || git commit -m "chore(rss): daily snapshot $(date +%Y-%m-%d)"
          git push
